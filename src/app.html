<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light dark" />
		<script>
			(function () {
				try {
					var t = localStorage.getItem('slowbreath:theme') || 'system';
					var isDark =
						t === 'dark' ||
						(t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (isDark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		<!-- HitsOnce analytics: load the first-party tracker in production (skips localhost). -->
		<script>
			(function () {
				var h = location.hostname;
				if (h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local')) return;
				var s = document.createElement('script');
				s.src = '/_stats';
				s.defer = true;
				document.head.appendChild(s);
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
